<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마술 학습 놀이터</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════   공통 기반════════════════════════════════ */
:root {  --mint:#62b3a4; --mint-light:#eaf6f4;  --bg:#fdf1ed; --card:#fff; --text:#333;  --orange:#f49f5a; --orange-dark:#e08a45;  --border:#f0dec5; --red:#e55;  --teacher:#7a5c3a; --teacher-bg:#fffbf0; --teacher-border:#f0d99a;  --pink:#ff8e8b; --pink-light:#fff5f5; --pink-border:#ffc2c0;  --purple:#8a7ce8; --purple-light:#f3f0ff; --purple-bubble:#e0d8ff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Jua',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:var(--text);}
/* ════════════════════════════════   홈 화면════════════════════════════════ */
#homeScreen{position:fixed;inset:0;background:linear-gradient(160deg,#62b3a4 0%,#f49f5a 100%);display:flex;justify-content:center;align-items:center;z-index:300;flex-direction:column;gap:0;}
.home-card{background:white;border-radius:32px;padding:40px 48px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.22);width:520px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.home-logo{font-size:64px;line-height:1;margin-bottom:4px;}
.home-card h1{font-size:30px;color:var(--mint);margin-bottom:2px;}
.home-card p{font-size:16px;color:#999;margin-bottom:16px;}
.home-nick-row{display:flex;gap:10px;width:100%;margin-bottom:8px;}
.nick-input{flex:1;padding:13px 18px;border:2px solid #ddd;border-radius:12px;font-family:inherit;font-size:18px;text-align:center;outline:none;transition:border-color .2s;}
.nick-input:focus{border-color:var(--mint);}
.nick-confirm-btn{padding:13px 20px;background:var(--mint);color:white;border:none;border-radius
