<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지음 프로젝트</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --mint:#62b3a4;--mint-light:#eaf6f4;--bg:#fdf1ed;--card:#fff;--text:#333;
  --orange:#f49f5a;--orange-dark:#e08a45;--border:#f0dec5;--red:#e55;
  --teacher:#7a5c3a;--teacher-bg:#fffbf0;--teacher-border:#f0d99a;
  --pink:#ff8e8b;--pink-light:#fff5f5;--pink-border:#ffc2c0;
  --purple:#8a7ce8;--purple-light:#f3f0ff;--purple-bubble:#e0d8ff;
  --blue:#4a90e2;--blue-light:#f0f7ff;--blue-border:#a4c8f0;
  --poem:#e8a44a;--poem-light:#fffbf0;--poem-border:#f5d89a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Jua',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:var(--text);}
#homeScreen{position:fixed;inset:0;background:linear-gradient(160deg,#62b3a4,#f49f5a);display:flex;justify-content:center;align-items:center;z-index:300;}
.home-card{background:white;border-radius:32px;padding:36px 44px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.22);width:640px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.home-logo{font-size:60px;line-height:1;margin-bottom:4px;}
.home-card h1{font-size:32px;color:var(--mint);}
.home-card p{font-size:15px;color:#888;margin-bottom:8px;}
.home-nick-row{display:flex;gap:10px;width:100%;max-width:400px;}
.nick-input{flex:1;padding:12px 16px;border:2px solid #ddd;border-radius:12px;font-family:inherit;font-size:18px;text-align:center;outline:none;}
.nick-input:focus{border-color:var(--mint);}
.nick-confirm-btn{padding:12px 18px;background:var(--mint);color:white;border:none;border-radius:12px;font-family:inherit;font-size:17px;cursor:pointer;}
.setup-error{font-size:14px;color:var(--red);min-height:18px;}
.app-grid{display:grid;grid-templateColumns:repeat(2,1fr);gap:14px;width:100%;margin-top:6px;}
.app-card{background:linear-gradient(135deg,var(--c1),var(--c2));border-radius:18px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:transform .18s;border:none;font-family:inherit;color:white;box-shadow:0 4px 16px rgba(0,0,0,.12);}
.app-card:hover{transform:translateY(-4px) scale(1.04);}
.app-card .ac-step{font-size:12px;background:rgba(255,255,255,.25);padding:3px 10px;border-radius:12px;}
.app-card .ac-icon{font-size:38px;}.app-card .ac-name{font-size:19px;font-weight:bold;}
.app-card .ac-desc{font-size:12px;opacity:.9;line-height:1.4;text-align:center;word-break:keep-all;}
.app-card.dodum{--c1:#4a90e2;--c2:#357abd;}.app-card.ieum{--c1:#62b3a4;--c2:#4e9a8c;}
.app-card.ttieum{--c1:#8a7ce8;--c2:#6a5cc8;}.app-card.jieum{--c1:#ff8e8b;--c2:#ff6b68;}
.home-nick-label{font-size:14px;color:#888;align-self:flex-start;margin-left:68px;}
#appWrapper{display:none;}.app-screen{display:none;}.app-screen.active{display:flex;flex-direction:column;}
.tablet{width:1024px;height:768px;background:var(--bg);border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden;display:flex;flex-direction:column;}
.hbtn{background:rgba(255,255,255,.22);border:none;color:white;padding:6px 11px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;white-space:nowrap;}
.hbtn:hover{background:rgba(255,255,255,.38);}.hbtn.orange{background:var(--orange);}
.hbtn.orange:hover{background:var(--orange-dark);}.hbtn:disabled{opacity:.5;cursor:not-allowed;}
.home-btn{background:rgba(255,255,255,.22);border:none;color:white;padding:6px 10px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;}
/* 돋움 */
#dodumApp .tablet{background:var(--blue-light);}
#dodumApp header{background:var(--blue);color:white;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
#dodumApp main{display:flex;flex:1;padding:12px;gap:12px;overflow:hidden;}
.m-panel{flex:1;background:white;border-radius:18px;padding:16px;display:flex;flex-direction:column;border:3px solid var(--blue-border);overflow:hidden;}
.m-panel-title{text-align:center;font-size:16px;margin-bottom:8px;color:var(--blue);border-bottom:2px dashed var(--blue-border);padding-bottom:7px;flex-shrink:0;}
.m-witness-box{flex:1;background:#f4f4f4;border-radius:12px;display:flex;justify-content:center;align-items:center;overflow:hidden;border:2px solid #ddd;position:relative;}
.m-textarea{flex:1;resize:none;border:2px dashed var(--blue);border-radius:12px;padding:12px;font-family:inherit;font-size:16px;line-height:1.6;outline:none;background:#fcfdff;}
.m-textarea:focus{border-style:solid;}
.m-img-box{flex:2;background:#f4f4f4;border-radius:12px;border:2px solid #ddd;position:relative;overflow:hidden;}
.m-action-btn{background:var(--blue);color:white;border:none;border-radius:12px;padding:10px 16px;font-family:inherit;font-size:16px;cursor:pointer;margin-top:8px;width:100%;}
.m-action-btn:disabled{opacity:.5;cursor:not-allowed;}
.m-score-box{background:var(--blue-light);padding:9px;border-radius:12px;margin-top:8px;text-align:center;border:2px solid var(--blue-border);display:none;flex-shrink:0;}

/* 검거 도장 스타일 */
.arrest-stamp {display:inline-block; padding:2px 8px; border:3px solid currentColor; border-radius:8px; font-size:18px; font-weight:bold; transform:rotate(-10deg); margin-left:10px; opacity:0; transition:opacity 0.3s, transform 0.3s;}
.arrest-stamp.show {opacity:1; transform:rotate(-5deg) scale(1.1);}
.arrest-stamp.success {color:#d32f2f;}
.arrest-stamp.fail {color:#555;}

/* 이음 */
#ieumApp header{background:var(--mint);color:white;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.h-left,.h-right{display:flex;align-items:center;gap:7px;}
.date-badge{background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px;font-size:12px;}
.user-chip{background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;font-size:13px;}
#ieumApp main{display:flex;flex:1;padding:11px;gap:11px;overflow:hidden;}
.panel{flex:1;background:var(--card);border-radius:16px;padding:12px;display:flex;flex-direction:column;box-shadow:0 4px 20px rgba(0,0,0,.06);border:2px solid var(--border);overflow:hidden;}
.panel-title{text-align:center;font-size:15px;margin-bottom:7px;color:#666;flex-shrink:0;}
.manuscript{flex:1;width:100%;border:none;resize:none;font-family:inherit;font-size:17px;line-height:40px;background-image:repeating-linear-gradient(white 0,white 38px,var(--mint) 38px,var(--mint) 40px);outline:none;overflow-y:auto;}
.richness-bar-wrap, .mission-bar-wrap{margin-top:7px;flex-shrink:0;background:#f5f5f5;border-radius:10px;padding:6px 10px;display:flex;align-items:center;gap:7px;}
.richness-track, .mission-track{flex:1;height:10px;background:#e0e0e0;border-radius:6px;overflow:hidden;}
.richness-fill{height:100%;width:0%;border-radius:6px;background:linear-gradient(to right,#b0b0b0,var(--mint),var(--orange));transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.mission-fill{height:100%;width:0%;border-radius:6px;background:linear-gradient(to right, #b0b0b0, var(--purple), var(--pink));transition:width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);}
.richness-score{font-size:12px;color:var(--mint);white-space:nowrap;min-width:54px;text-align:right;}
.mission-score{font-size:12px;color:var(--purple);white-space:nowrap;min-width:54px;text-align:right;}
.mission-box {background: var(--mint-light);border: 2px dashed var(--mint);border-radius: 12px;padding: 10px 14px;margin-bottom: 8px;display: flex;justify-content: space-between;align-items: center;gap: 10px;}
.mission-text-area {flex: 1;}
.mission-title {font-size: 14px;font-weight: bold;color: var(--mint);margin-bottom: 2px;}
.mission-desc {font-size: 12px;color: #555;word-break: keep-all;}
.mission-btn {background: var(--mint);color: white;border: none;border-radius: 8px;padding: 6px 12px;font-family: inherit;font-size: 12px;cursor: pointer;white-space: nowrap;}
.mission-btn:hover { background: #4e9a8c; }
.stamp-wrap{display:flex;justify-content:center;align-items:center;margin-top:4px;flex-shrink:0;min-height:68px;}
.stamp{position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;width:96px;height:66px;border-radius:10px;border:4px solid currentColor;text-align:center;padding:2px 6px;opacity:0;transform:scale(1.6) rotate(-12deg);transition:opacity .35s,transform .45s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
.stamp.show{opacity:1;transform:scale(1) rotate(-8deg);}
.stamp::before{content:'';position:absolute;inset:3px;border-radius:6px;border:2px solid currentColor;opacity:.3;}
.stamp-icon{font-size:20px;line-height:1;}.stamp-text{font-size:10px;font-weight:bold;line-height:1.3;margin-top:2px;}
.stamp.s5{color:#e85c4a;background:rgba(232,92,74,.08);}.stamp.s4{color:#f49f5a;background:rgba(244,159,90,.08);}
.stamp.s3{color:#62b3a4;background:rgba(98,179,164,.08);}.stamp.s2{color:#7a8fa6;background:rgba(122,143,166,.08);}
.stamp.s1{color:#aaa;background:rgba(180,180,180,.08);}
.teacher-box{background:var(--teacher-bg);border:2px solid var(--teacher-border);border-radius:12px;padding:8px 10px;display:flex;gap:8px;align-items:flex-start;margin-top:4px;min-height:58px;flex-shrink:0;position:relative;}
.teacher-box::before{content:'선생님 한마디';position:absolute;top:-10px;left:12px;background:var(--teacher-bg);border:1.5px solid var(--teacher-border);border-radius:20px;padding:1px 8px;font-size:10px;color:var(--teacher);}
.teacher-face{width:34px;height:34px;min-width:34px;background:white;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:17px;border:2px solid var(--teacher-border);flex-shrink:0;}
.teacher-face.thinking{animation:teacherBob .8s ease-in-out infinite alternate;}
@keyframes teacherBob{to{transform:translateY(-3px);}}
.teacher-msg{font-size:11px;line-height:1.55;color:var(--teacher);padding-top:2px;}
.teacher-hi{color:#c47d2a;font-weight:bold;}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-shrink:0;}
.img-wrap{position:relative;flex:1;border-radius:12px;overflow:hidden;background:#fdf5e6;border:3px solid #e8d5b0;}
.placeholder{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#c0c0c0;gap:7px;text-align:center;padding:16px;}
.di-main{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:none;background:#fdf5e6;}
.d-loading{position:absolute;inset:0;background:rgba(255,251,240,.96);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:20;border-radius:12px;gap:8px;padding:16px;}
.progress-wrap{width:190px;background:#ecddb3;border-radius:20px;height:12px;overflow:hidden;border:2px solid #d4b87a;}
.progress-fill{height:100%;width:0%;background:linear-gradient(to right,#f49f5a,#e85c4a);border-radius:20px;transition:width .5s linear;}
.progress-label{font-size:11px;color:#c47d2a;}
.richness-badge{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:8;background:rgba(0,0,0,.55);color:white;padding:2px 11px;border-radius:20px;font-size:11px;pointer-events:none;display:none;white-space:nowrap;}
.error-overlay{position:absolute;inset:0;background:rgba(255,240,240,.96);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:20;border-radius:12px;gap:8px;padding:16px;text-align:center;}
.error-detail{font-size:11px;color:#888;background:white;padding:8px 11px;border-radius:8px;max-width:100%;word-break:break-all;border:1px solid #eee;line-height:1.5;}
/* 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:400;}
.modal-bg.open{display:flex;}
.modal{background:white;border-radius:20px;padding:22px;width:500px;max-height:82vh;overflow-y:auto;font-family:'Jua',sans-serif;box-shadow:0 10px 40px rgba(0,0,0,.2);}
.modal h2{font-size:18px;color:var(--mint);margin-bottom:10px;}
.modal-btns{display:flex;gap:8px;margin-top:10px;}
.mbtn{flex:1;padding:8px;border:none;border-radius:10px;font-family:inherit;font-size:14px;cursor:pointer;}
.mbtn.ghost{background:#eee;color:var(--text);}.mbtn.primary{background:var(--mint);color:white;}
.mbtn.red{background:#fee2e2;color:#b91c1c;}
.sel-list{display:flex;flex-direction:column;gap:7px;}
.sel-item{border:2px solid var(--border);border-radius:12px;padding:8px 11px;display:flex;gap:9px;align-items:center;cursor:pointer;transition:all .15s;user-select:none;}
.sel-item:hover{border-color:var(--orange);background:#fdf5ee;}
.sel-item.selected{border-color:var(--mint);background:#eaf6f4;}
.sel-item .chk{width:22px;height:22px;border:2px solid #ccc;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.sel-item.selected .chk{background:var(--mint);border-color:var(--mint);color:white;}
.d-del{background:none;border:none;font-size:15px;cursor:pointer;color:#ccc;padding:2px 6px;border-radius:6px;flex-shrink:0;}
.d-del:hover{color:var(--red);}
.thumb-img{width:44px;height:44px;border-radius:7px;object-fit:cover;background:#eee;flex-shrink:0;}
.empty-list{text-align:center;color:#bbb;font-size:15px;padding:22px;}
/* 틔음 */
#ttieumApp .tablet{background:var(--purple-light);display:flex;flex-direction:column;}
#ttieumApp header{background:var(--purple);color:white;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.story-phone{flex:1;display:flex;flex-direction:column;overflow:hidden;margin:12px;background:white;border-radius:20px;box-shadow:0 4px 20px rgba(0,0,0,.1);}
.chat-box{flex:1;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:#f8f9fa;}
.bubble{max-width:78%;padding:10px 13px;border-radius:18px;font-size:15px;line-height:1.55;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;}}
.bubble.system{align-self:center;background:#eee;font-size:11px;border-radius:10px;color:#666;text-align:center;}
.bubble.user{align-self:flex-end;background:white;border:2px solid var(--purple);border-bottom-right-radius:4px;}
.bubble.ai{align-self:flex-start;background:var(--purple-bubble);border-bottom-left-radius:4px;}
.question-highlight{display:block;margin-top:6px;padding-top:6px;border-top:1px dashed #bba8ff;color:#5544aa;font-weight:bold;}
.story-input-area{padding:10px;background:white;border-top:1px solid #ddd;display:flex;gap:7px;flex-shrink:0;}
.story-textarea{flex:1;resize:none;padding:8px;border:2px solid #ddd;border-radius:10px;font-family:inherit;font-size:14px;height:48px;outline:none;}
.story-textarea:focus{border-color:var(--purple);}
.story-send-btn{background:var(--purple);color:white;border:none;border-radius:10px;padding:0 14px;font-family:inherit;font-size:15px;cursor:pointer;}
.story-send-btn:disabled{background:#ccc;cursor:not-allowed;}
/* 저장된 틔음 목록 */
.story-list-item{border:2px solid var(--purple-bubble);border-radius:12px;padding:10px 12px;cursor:pointer;margin-bottom:7px;}
.story-list-item:hover{background:var(--purple-light);}
.story-list-title{font-size:14px;color:var(--purple);font-weight:bold;}
.story-list-preview{font-size:12px;color:#888;margin-top:3px;}
/* 지음 */
#jieumApp .tablet{background:var(--pink-
