<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마술 그림일기</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
:root {
  --mint:#62b3a4; --mint-light:#eaf6f4;
  --bg:#fdf1ed; --card:#fff; --text:#333;
  --orange:#f49f5a; --orange-dark:#e08a45;
  --border:#f0dec5; --red:#e55;
  --teacher:#7a5c3a; --teacher-bg:#fffbf0; --teacher-border:#f0d99a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Jua',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:var(--text);}

/* ── 닉네임 설정 화면 ── */
#setupScreen{position:fixed;inset:0;background:linear-gradient(135deg,#62b3a4,#4e9a8c);display:flex;justify-content:center;align-items:center;z-index:200;}
.setup-card{background:white;border-radius:28px;padding:50px 44px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);width:380px;display:flex;flex-direction:column;align-items:center;gap:16px;}
.setup-logo{font-size:64px;line-height:1;}
.setup-card h1{font-size:28px;color:var(--mint);}
.setup-card p{font-size:17px;color:#888;line-height:1.6;}
.nick-input{width:100%;padding:13px 18px;border:2px solid #ddd;border-radius:12px;font-family:inherit;font-size:18px;text-align:center;outline:none;transition:border-color .2s;}
.nick-input:focus{border-color:var(--mint);}
.start-btn{width:100%;padding:14px;background:var(--mint);color:white;border:none;border-radius:12px;font-family:inherit;font-size:18px;cursor:pointer;transition:background .2s;}
.start-btn:hover{background:#4e9a8c;}
.setup-error{font-size:14px;color:var(--red);min-height:20px;}

/* ── 앱 ── */
#appScreen{display:none;}
.tablet{width:1024px;height:768px;background:var(--bg);border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden;display:flex;flex-direction:column;}

/* ── 헤더 ── */
header{background:var(--mint);color:white;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.h-left,.h-right{display:flex;align-items:center;gap:10px;}
.logo{font-size:20px;}
.date-badge{background:rgba(255,255,255,.2);padding:5px 12px;border-radius:20px;font-size:14px;}
.user-chip{background:rgba(255,255,255,.2);padding:5px 14px;border-radius:20px;font-size:15px;}
.btn{background:rgba(255,255,255,.2);border:none;color:white;padding:7px 13px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;transition:background .2s,transform .1s;white-space:nowrap;}
.btn:hover{background:rgba(255,255,255,.35);}
.btn:active{transform:scale(.97);}
.btn.orange{background:var(--orange);}
.btn.orange:hover{background:var(--orange-dark);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ── 메인 ── */
main{display:flex;flex:1;padding:14px;gap:14px;overflow:hidden;}
.panel{flex:1;background:var(--card);border-radius:16px;padding:14px;display:flex;flex-direction:column;box-shadow:0 4px 20px rgba(0,0,0,.06);border:2px solid var(--border);overflow:hidden;}
.panel-title{text-align:center;font-size:17px;margin-bottom:8px;color:#666;flex-shrink:0;}

/* ── 원고지 ── */
.manuscript{flex:1;width:100%;border:none;resize:none;font-family:inherit;font-size:19px;line-height:40px;background-image:repeating-linear-gradient(white 0,white 38px,var(--mint) 38px,var(--mint) 40px);outline:none;color:var(--text);overflow-y:auto;}

/* ── 묘사력 바 ── */
.richness-bar-wrap{margin-top:8px;flex-shrink:0;background:#f5f5f5;border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:10px;}
.richness-label{font-size:14px;color:#999;white-space:nowrap;}
.richness-track{flex:1;height:12px;background:#e0e0e0;border-radius:6px;overflow:hidden;}
.richness-fill{height:100%;width:0%;border-radius:6px;background:linear-gradient(to right,#b0b0b0,var(--mint),var(--orange));transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.richness-score{font-size:14px;color:var(--mint);white-space:nowrap;min-width:60px;text-align:right;}

/* ── 도장 ── */
.stamp-wrap{display:flex;justify-content:center;align-items:center;margin-top:6px;flex-shrink:0;min-height:72px;}
.stamp{
  position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;
  width:110px;height:72px;border-radius:12px;border:4px solid currentColor;
  font-family:'Jua',sans-serif;text-align:center;padding:6px 10px;
  opacity:0;transform:scale(1.6) rotate(-12deg);
  transition:opacity .35s,transform .45s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
}
.stamp.show{opacity:1;transform:scale(1) rotate(-8deg);}
.stamp::before{content:'';position:absolute;inset:3px;border-radius:8px;border:2px solid currentColor;opacity:.35;}
.stamp-icon{font-size:24px;line-height:1;}
.stamp-text{font-size:12px;font-weight:bold;line-height:1.3;margin-top:2px;}
.stamp.s5{color:#e85c4a;background:rgba(232,92,74,.08);}
.stamp.s4{color:#f49f5a;background:rgba(244,159,90,.08);}
.stamp.s3{color:#62b3a4;background:rgba(98,179,164,.08);}
.stamp.s2{color:#7a8fa6;background:rgba(122,143,166,.08);}
.stamp.s1{color:#aaa;background:rgba(180,180,180,.08);}

/* ── 선생님 코멘트 박스 ── */
.teacher-box{background:var(--teacher-bg);border:2px solid var(--teacher-border);border-radius:14px;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;margin-top:8px;min-height:76px;flex-shrink:0;position:relative;}
.teacher-box::before{content:'선생님 한마디';position:absolute;top:-11px;left:14px;background:var(--teacher-bg);border:1.5px solid var(--teacher-border);border-radius:20px;padding:1px 10px;font-size:11px;color:var(--teacher);font-family:'Jua',sans-serif;}
.teacher-face{width:44px;height:44px;min-width:44px;background:white;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:22px;border:2px solid var(--teacher-border);flex-shrink:0;}
.teacher-face.thinking{animation:teacherBob .8s ease-in-out infinite alternate;}
@keyframes teacherBob{to{transform:translateY(-3px);}}
.teacher-msg{font-size:14px;line-height:1.6;color:var(--teacher);padding-top:2px;}
.teacher-hi{color:#c47d2a;font-weight:bold;}

/* ── 오른쪽 패널 ── */
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-shrink:0;}
.img-wrap{position:relative;flex:1;border-radius:12px;overflow:hidden;background:#fdf5e6;border:3px solid #e8d5b0;}
.placeholder{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#c0c0c0;gap:10px;text-align:center;padding:20px;}
.placeholder .icon{font-size:52px;}
.placeholder .mt{font-size:17px;color:#aaa;}
.placeholder .st{font-size:13px;color:#ccc;}

/* 그림 표시 - 스케치 필터 없이 단일 이미지 */
.di-main{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:none;background:#fdf5e6;}

.richness-badge{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:8;background:rgba(0,0,0,.55);color:white;padding:4px 14px;border-radius:20px;font-size:13px;pointer-events:none;display:none;white-space:nowrap;}

/* ── 로딩 오버레이 (예측 진행바 포함) ── */
.loading{position:absolute;inset:0;background:rgba(255,251,240,.93);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:20;border-radius:12px;gap:12px;padding:20px;}
.loading-crayon{font-size:48px;animation:crayonWiggle 0.6s ease-in-out infinite alternate;}
@keyframes crayonWiggle{from{transform:rotate(-8deg) scale(1);}to{transform:rotate(8deg) scale(1.1);}}
.loading-msg{font-size:16px;color:#7a5c3a;text-align:center;line-height:1.6;}
.loading-sub{font-size:13px;color:#aaa;text-align:center;}
.progress-wrap{width:220px;background:#ecddb3;border-radius:20px;height:16px;overflow:hidden;border:2px solid #d4b87a;}
.progress-fill{height:100%;width:0%;background:linear-gradient(to right,#f49f5a,#e85c4a);border-radius:20px;transition:width 1s linear;}
.progress-label{font-size:13px;color:#c47d2a;}

.error-overlay{position:absolute;inset:0;background:rgba(255,240,240,.95);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:20;border-radius:12px;gap:10px;padding:20px;text-align:center;}
.error-detail{font-size:13px;color:#888;background:white;padding:10px 14px;border-radius:8px;max-width:100%;word-break:break-all;border:1px solid #eee;line-height:1.6;}
.err-btns{display:flex;gap:10px;margin-top:4px;}
.ebtn{padding:8px 18px;border:none;border-radius:8px;font-family:inherit;font-size:15px;cursor:pointer;}
.ebtn.retry{background:var(--mint);color:white;}
.ebtn.dismiss{background:#eee;color:var(--text);}

.img-info{margin-top:8px;background:var(--mint-light);padding:8px;border-radius:10px;text-align:center;font-size:14px;color:var(--mint);flex-shrink:0;}

/* ── 모달 ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:100;}
.modal-bg.open{display:flex;}
.modal{background:white;border-radius:20px;padding:26px;width:480px;max-height:78vh;overflow-y:auto;font-family:'Jua',sans-serif;box-shadow:0 10px 40px rgba(0,0,0,.2);}
.modal h2{font-size:20px;color:var(--mint);margin-bottom:14px;}
.modal-btns{display:flex;gap:10px;margin-top:14px;}
.mbtn{flex:1;padding:10px;border:none;border-radius:10px;font-family:inherit;font-size:16px;cursor:pointer;transition:opacity .2s;}
.mbtn:hover{opacity:.85;}
.mbtn.primary{background:var(--mint);color:white;}
.mbtn.ghost{background:#eee;color:var(--text);}
.diary-list{display:flex;flex-direction:column;gap:10px;}
.diary-item{border:2px solid var(--border);border-radius:12px;padding:10px;cursor:pointer;display:flex;gap:10px;align-items:center;transition:background .2s,border-color .2s;}
.diary-item:hover{background:#fdf1ed;border-color:var(--orange);}
.d-del{margin-left:auto;background:none;border:none;font-size:18px;cursor:pointer;color:#ccc;padding:4px 8px;border-radius:6px;transition:color .2s;}
.d-del:hover{color:var(--red);}
.diary-thumb{width:54px;height:54px;border-radius:8px;object-fit:cover;background:#eee;flex-shrink:0;display:flex;justify-content:center;align-items:center;font-size:26px;}
.d-date{font-size:12px;color:#aaa;}
.d-text{font-size:15px;margin-top:3px;}
.d-richness{font-size:12px;color:var(--mint);margin-top:2px;}
.empty-list{text-align:center;color:#bbb;font-size:17px;padding:28px;}

/* ── 토스트 ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--mint);color:white;padding:12px 26px;border-radius:50px;font-size:16px;z-index:300;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- 닉네임 설정 -->
<div id="setupScreen">
  <div class="setup-card">
    <div class="setup-logo">🎨</div>
    <h1>마술 그림일기</h1>
    <p>이름을 알려주세요!<br>매일매일 내 이야기를 그림으로!</p>
    <input class="nick-input" id="nickInput" maxlength="10" placeholder="예: 민준, 서아, 하늘이..." autocomplete="off">
    <button class="start-btn" onclick="startApp()">시작하기 ✨</button>
    <div class="setup-error" id="setupError"></div>
  </div>
</div>

<!-- 일기 목록 모달 -->
<div class="modal-bg" id="listModal">
  <div class="modal">
    <h2>📖 나의 일기장</h2>
    <div class="diary-list" id="diaryList"></div>
    <div class="modal-btns">
      <button class="mbtn ghost" onclick="closeModal('listModal')">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 앱 -->
<div id="appScreen">
<div class="tablet">
  <header>
    <div class="h-left">
      <button class="btn" onclick="newDiary()">✏️ 새 일기</button>
      <span class="logo">🎨 마술 그림일기</span>
    </div>
    <div class="h-right">
      <span class="date-badge" id="dateDisplay"></span>
      <div class="user-chip" id="userChip"></div>
      <button class="btn orange" onclick="saveDiary()">💾 저장</button>
      <button class="btn" onclick="openList()">📖 일기장</button>
    </div>
  </header>

  <main>
    <!-- 왼쪽: 글쓰기 -->
    <section class="panel">
      <div class="panel-title">[ 오늘의 이야기 ]</div>
      <textarea class="manuscript" id="diary"
        placeholder="오늘 있었던 일을 자유롭게 적어보세요 🌟&#10;&#10;무슨 일이 있었나요?&#10;누구랑 있었나요?&#10;어떤 기분이었나요?&#10;어떻게 생겼나요?"></textarea>

      <div class="richness-bar-wrap">
        <span class="richness-label">✏️ 묘사력</span>
        <div class="richness-track"><div class="richness-fill" id="richnessFill"></div></div>
        <span class="richness-score" id="richnessScore">— 점수 대기중</span>
      </div>
      <div class="stamp-wrap">
        <div class="stamp" id="stamp">
          <div class="stamp-icon" id="stampIcon"></div>
          <div class="stamp-text" id="stampText"></div>
        </div>
      </div>

      <!-- 선생님 코멘트 -->
      <div class="teacher-box">
        <div class="teacher-face" id="teacherFace">👩‍🏫</div>
        <div class="teacher-msg" id="teacherMsg">
          <span class="teacher-hi">선생님</span><br>
          일기를 쓰면 선생님이 읽고 조언해드릴게요! 오늘 있었던 일을 자유롭게 적어보세요 😊
        </div>
      </div>
    </section>

    <!-- 오른쪽: 그림 -->
    <section class="panel">
      <div class="panel-header">
        <div class="panel-title" style="margin:0;" id="imgTitle">[ 오늘의 그림 ]</div>
        <button class="btn orange" id="genBtn" onclick="generateImage()" style="font-size:13px;">🖍️ 그림 그리기</button>
      </div>

      <div class="img-wrap">
        <div class="placeholder" id="placeholder">
          <div class="icon">🖼️</div>
          <div class="mt">일기를 쓰고 그림을 그려보세요!</div>
          <div class="st">자세히 쓸수록 더 컬러풀한 그림이 나와요 🌈</div>
        </div>

        <!-- 단일 이미지 (스케치 필터 없음) -->
        <img class="di-main" id="imgMain" alt="그림일기">

        <div class="richness-badge" id="richnessBadge"></div>

        <!-- 로딩 오버레이 (예측 진행바) -->
        <div class="loading" id="loading">
          <div class="loading-crayon" id="loadingEmoji">🖍️</div>
          <div class="loading-msg" id="loadingMsg">그림 그리는 중이에요...</div>
          <div class="progress-wrap">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-label" id="progressLabel">0%</div>
          <div class="loading-sub" id="loadingSub">잠깐만 기다려주세요 🌟</div>
        </div>

        <div class="error-overlay" id="errorOverlay">
          <div style="font-size:36px;">😢</div>
          <div style="font-size:17px;color:var(--red);" id="errorTitle">오류 발생</div>
          <div class="error-detail" id="errorDetail"></div>
          <div class="err-btns">
            <button class="ebtn retry" onclick="retryGenerate()">🔄 다시 시도</button>
            <button class="ebtn dismiss" onclick="hideError()">닫기</button>
          </div>
        </div>
      </div>

      <div class="img-info" id="imgInfo">🖍️ 자세히 쓸수록 더 컬러풀한 그림일기가 나와요!</div>
    </section>
  </main>
</div>
</div>

<script>
/* ══════════════════════════════════════════
   상태
══════════════════════════════════════════ */
let currentNick   = '';
let currentImgUrl = null;
let currentRich   = 0;
let lastText      = '';
let currentId     = null;
let lastBlobUrl   = null;
let progressTimer = null;

const SK = {
  nick:    'mdj_nick',
  entries: uid => `mdj_entries_${uid}`
};
const $ = id => document.getElementById(id);

/* ── 날짜 ── */
const dateLabel = (() => {
  const d = new Date(), days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
})();
$('dateDisplay').textContent = dateLabel;

/* ── Vercel 프록시 주소 ── */
const PROXY_URL = 'https://magic-diary.vercel.app/api/proxy';

/* ══════════════════════════════════════════
   닉네임 / 시작
══════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(SK.nick);
  if (saved) { currentNick = saved; launchApp(); }
  $('nickInput').addEventListener('keydown', e => { if(e.key==='Enter') startApp(); });
});

function startApp() {
  const v = $('nickInput').value.trim();
  if (!v) { $('setupError').textContent = '이름을 입력해주세요!'; return; }
  currentNick = v;
  localStorage.setItem(SK.nick, v);
  launchApp();
}

function launchApp() {
  $('setupScreen').style.display = 'none';
  $('appScreen').style.display   = 'block';
  $('userChip').textContent = `👤 ${currentNick}`;
}

/* ══════════════════════════════════════════
   일기 저장소
══════════════════════════════════════════ */
function getEntries() {
  try { return JSON.parse(localStorage.getItem(SK.entries(currentNick)) || '[]'); }
  catch { return []; }
}
function setEntries(arr) {
  localStorage.setItem(SK.entries(currentNick), JSON.stringify(arr));
}

function saveDiary() {
  const text = $('diary').value.trim();
  if (!text) { toast('일기를 먼저 써보세요! ✏️'); return; }
  const entries = getEntries();
  const now = Date.now();
  const title = $('imgTitle').textContent;
  if (currentId) {
    const idx = entries.findIndex(e => e.id === currentId);
    if (idx !== -1) {
      entries[idx] = { ...entries[idx], text, imgUrl: currentImgUrl, title, richness: currentRich, dateLabel, updatedAt: now };
    } else {
      entries.unshift({ id: currentId, text, imgUrl: currentImgUrl, title, richness: currentRich, dateLabel, createdAt: now, updatedAt: now });
    }
    setEntries(entries);
    toast('💾 일기가 수정되었어요!');
  } else {
    const id = `entry_${now}_${Math.random().toString(36).slice(2,7)}`;
    entries.unshift({ id, text, imgUrl: currentImgUrl, title, richness: currentRich, dateLabel, createdAt: now, updatedAt: now });
    setEntries(entries);
    currentId = id;
    toast('💾 일기가 저장되었어요!');
  }
}

function openList() {
  const entries = getEntries();
  const list = $('diaryList');
  if (!entries.length) {
    list.innerHTML = '<div class="empty-list">아직 저장된 일기가 없어요 📝<br><small>일기를 쓰고 저장해보세요!</small></div>';
  } else {
    list.innerHTML = entries.map(e => `
      <div class="diary-item" onclick="loadEntry('${e.id}')">
        ${e.imgUrl
          ? `<img src="${e.imgUrl}" class="diary-thumb" style="display:block" onerror="this.outerHTML='<div class=\\'diary-thumb\\'>📝</div>'">`
          : `<div class="diary-thumb">📝</div>`}
        <div style="flex:1;min-width:0;">
          <div class="d-date">${e.dateLabel||''}</div>
          <div class="d-text">${(e.text||'').substring(0,38)}${(e.text||'').length>38?'...':''}</div>
          ${e.richness ? `<div class="d-richness">묘사력 ${e.richness}/10</div>` : ''}
        </div>
        <button class="d-del" onclick="deleteEntry(event,'${e.id}')">🗑️</button>
      </div>`).join('');
  }
  openModal('listModal');
}

function loadEntry(id) {
  const e = getEntries().find(x => x.id === id);
  if (!e) return;
  currentId = e.id;
  $('diary').value = e.text || '';
  $('imgTitle').textContent = e.title || '[ 오늘의 그림 ]';
  currentRich = e.richness || 0;
  currentImgUrl = e.imgUrl || null;
  updateRichnessBar(currentRich);
  if (e.imgUrl) {
    showImage(e.imgUrl, getRichnessStyle(currentRich).label);
  } else {
    resetImage();
  }
  closeModal('listModal');
  toast('📖 일기를 불러왔어요!');
}

function deleteEntry(ev, id) {
  ev.stopPropagation();
  if (!confirm('이 일기를 삭제할까요?')) return;
  const arr = getEntries().filter(e => e.id !== id);
  setEntries(arr);
  if (currentId === id) { currentId = null; newDiary(); }
  openList();
  toast('🗑️ 삭제됐어요.');
}

function newDiary() {
  if ($('diary').value.trim() && !confirm('새 일기를 시작할까요?\n현재 내용은 사라져요.')) return;
  currentId = null;
  $('diary').value = '';
  currentImgUrl = null; currentRich = 0;
  $('imgTitle').textContent = '[ 오늘의 그림 ]';
  updateRichnessBar(0);
  $('richnessScore').textContent = '— 점수 대기중';
  resetImage();
  setTeacher('idle');
}

/* ══════════════════════════════════════════
   Claude API 분석
══════════════════════════════════════════ */
async function analyzeRichness(text) {
  const raw = await callClaude({
    model: 'claude-haiku-4-5-20251001', max_tokens: 350,
    system: `You are a warm Korean elementary school teacher reading a child's diary (age 5-10).
Return ONLY valid JSON, no markdown:
{
  "richness": <int 1-10>,
  "advice": "<2-3 sentences in Korean: first praise something specific from the diary content, then give ONE concrete suggestion to improve the writing (e.g. add colors, feelings, what happened next). Speak gently like a teacher to a young child.>",
  "title": "<Korean diary title, max 7 chars, cute and specific to the content>",
  "prompt": "<English: describe the SINGLE most important scene from the diary in 8-12 words. Focus on: who + what action + where. Simple and visual.>"
}
Richness: 1-3=very short under 50chars, 4-6=some detail 50-150chars, 7-10=rich description over 150chars`,
    messages:[{role:'user', content:text}]
  });
  try {
    return JSON.parse(raw.replace(/```json|```/g,'').trim());
  } catch {
    const r = text.length<50?2:text.length<150?5:8;
    return {
      richness: r,
      advice: '일기를 잘 썼어요! 다음에는 그때 어떤 기분이었는지도 써보면 더 좋겠어요 😊',
      title: '오늘의 일기',
      prompt: 'Korean child having a happy day outside'
    };
  }
}

/* ── 묘사력에 따른 이미지 스타일 ── */
function getRichnessStyle(r) {
  // 5~8세 아이가 크레파스로 그린 그림일기 스타일
  const base = 'kids crayon drawing diary style, 5-8 year old child artwork, thick uneven crayon lines, wobbly outlines, flat bright colors, simple childlike shapes, white paper background, no shading, naive art';

  if (r <= 2) return {
    modifier: `${base}, only 2-3 colors, very simple single figure, minimal background, like a toddler drawing`,
    label: `✏️ 아주 단순한 그림 (${r}/10)`, w: 320, h: 256
  };
  if (r <= 4) return {
    modifier: `${base}, 3-4 colors, one main scene, simple background with ground line and sky`,
    label: `🖍️ 크레파스 그림 (${r}/10)`, w: 320, h: 256
  };
  if (r <= 6) return {
    modifier: `${base}, 5-6 bright colors, clear main character doing something, simple setting`,
    label: `🎨 색깔 그림 (${r}/10)`, w: 352, h: 272
  };
  if (r <= 8) return {
    modifier: `${base}, many bright crayon colors, detailed scene with characters and setting, expressive faces`,
    label: `🌈 풍부한 그림 (${r}/10)`, w: 384, h: 288
  };
  return {
    modifier: `${base}, vibrant full-color crayon scene, multiple characters, detailed environment, sun clouds grass, very expressive and joyful`,
    label: `⭐ 최고의 그림 (${r}/10)`, w: 384, h: 288
  };
}

/* ── 도장 등급 ── */
const STAMP_GRADES = [
  null,
  { cls:'s1', icon:'📝', text:'노력이\n필요해요' },
  { cls:'s1', icon:'📝', text:'노력이\n필요해요' },
  { cls:'s2', icon:'🌱', text:'조금 더\n노력해요' },
  { cls:'s2', icon:'🌱', text:'조금 더\n노력해요' },
  { cls:'s3', icon:'⭐', text:'보통' },
  { cls:'s3', icon:'⭐', text:'보통' },
  { cls:'s4', icon:'👍', text:'잘했어요' },
  { cls:'s4', icon:'👍', text:'잘했어요' },
  { cls:'s5', icon:'🌟', text:'참 잘했어요' },
  { cls:'s5', icon:'🌟', text:'참 잘했어요' },
];

function updateRichnessBar(r) {
  $('richnessFill').style.width = `${r*10}%`;
  const em = ['','😶','😐','🙂','😊','😄','😁','🤩','✨','🌟','🎆'];
  const tx = ['','아주 짧아요','조금 짧아요','조금 더 써봐요','보통','보통+','꽤 자세해요','자세해요!','아주 자세해요!','풍부해요!','완벽해요!'];
  $('richnessScore').textContent = r ? `${em[r]} ${tx[r]} (${r}/10)` : '— 점수 대기중';
  const stamp = $('stamp');
  stamp.classList.remove('show','s1','s2','s3','s4','s5');
  if (r >= 1) {
    const g = STAMP_GRADES[r];
    $('stampIcon').textContent = g.icon;
    $('stampText').textContent = g.text;
    stamp.classList.add(g.cls);
    requestAnimationFrame(() => requestAnimationFrame(() => stamp.classList.add('show')));
  }
}

/* ── 선생님 코멘트 ── */
let hintTimer;
$('diary').addEventListener('input', () => {
  clearTimeout(hintTimer);
  const txt = $('diary').value.trim();
  if (txt.length < 10) { setTeacher('idle'); updateRichnessBar(0); return; }
  setTeacher('thinking');
  hintTimer = setTimeout(() => runAnalysis(txt), 2500);
});

async function runAnalysis(text) {
  if (PROXY_URL) {
    try {
      const r = await analyzeRichness(text);
      currentRich = r.richness;
      updateRichnessBar(r.richness);
      setTeacher('advice', r.advice, r.richness);
    } catch(e) { setTeacher('error', e.message); }
  } else {
    const r = text.length<50?2:text.length<150?5:8;
    currentRich = r;
    updateRichnessBar(r);
    setTeacher('advice', '일기를 잘 썼어요! 다음에는 색깔이나 느낌도 적어보면 더 좋겠어요 😊', r);
  }
}

function setTeacher(state, msg, r) {
  const face = $('teacherFace'), msgEl = $('teacherMsg');
  face.classList.remove('thinking');
  if (state === 'idle') {
    face.textContent = '👩‍🏫';
    msgEl.innerHTML = `<span class="teacher-hi">선생님</span><br>일기를 쓰면 선생님이 읽고 조언해드릴게요! 오늘 있었던 일을 자유롭게 적어보세요 😊`;
  } else if (state === 'thinking') {
    face.textContent = '🤔';
    face.classList.add('thinking');
    msgEl.innerHTML = `<span class="teacher-hi">선생님</span><br>일기를 열심히 읽고 있어요... 잠깐만요 📖`;
  } else if (state === 'advice') {
    const star = r>=8?'🌟':r>=6?'✨':r>=4?'😊':'💪';
    face.textContent = star;
    msgEl.innerHTML = `<span class="teacher-hi">선생님 한마디</span><br>${msg}`;
  } else if (state === 'error') {
    face.textContent = '😅';
    msgEl.innerHTML = `<span class="teacher-hi">선생님</span><br>잠깐 문제가 생겼어요. 조금 있다가 다시 해볼게요!`;
  }
}

/* ══════════════════════════════════════════
   그림 생성
══════════════════════════════════════════ */
async function generateImage() {
  const text = $('diary').value.trim();
  if (!text) { toast('먼저 일기를 써보세요! ✏️'); return; }
  lastText = text;
  hideError();
  const btn = $('genBtn');
  btn.disabled = true;

  showLoadingScreen('💭', '일기를 읽고 있어요...', 0);
  startProgressAnim(0, 20, 3000); // 분석 단계 0→20%

  try {
    let analysis, sty;
    if (PROXY_URL) {
      analysis = await analyzeRichness(text);
      currentRich = analysis.richness;
      updateRichnessBar(analysis.richness);
      setTeacher('advice', analysis.advice, analysis.richness);
      if (analysis.title) $('imgTitle').textContent = `[ ${analysis.title} ]`;
      sty = getRichnessStyle(analysis.richness);
    } else {
      const r = text.length<50?2:text.length<150?5:8;
      currentRich = r;
      analysis = { richness:r, prompt:'Korean child playing outside happily' };
      sty = getRichnessStyle(r);
      updateRichnessBar(r);
    }

    updateLoadingScreen('🖍️', '크레파스로 그림을 그리고 있어요...', '열심히 색칠하는 중이에요!');
    startProgressAnim(20, 90, 28000); // 그림 생성 20→90%

    // 핵심 장면만 추출 (간결한 프롬프트)
    const scene = (analysis.prompt || 'Korean child playing outside').slice(0, 80);
    const prompt = `${scene}, ${sty.modifier}`;
    const seed = Math.floor(Math.random() * 9999);
    const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=${sty.w}&height=${sty.h}&nologo=true&nofeed=true&seed=${seed}&model=flux-schnell`;

    const blobUrl = await loadImg(url);
    startProgressAnim(90, 100, 600);
    await new Promise(r => setTimeout(r, 650));
    showImage(blobUrl, sty.label);

  } catch(err) {
    hideLoading();
    showError('그림 그리기 실패', err.message);
  }

  hideLoading();
  btn.disabled = false;
}

/* ── 예측 진행바 애니메이션 ── */
function startProgressAnim(from, to, duration) {
  clearInterval(progressTimer);
  const el = $('progressFill'), lbl = $('progressLabel');
  const steps = 30;
  const stepMs = duration / steps;
  const stepVal = (to - from) / steps;
  let current = from;
  el.style.width = `${from}%`;
  lbl.textContent = `${Math.round(from)}%`;
  progressTimer = setInterval(() => {
    current += stepVal;
    if (current >= to) { current = to; clearInterval(progressTimer); }
    el.style.width = `${current}%`;
    lbl.textContent = `${Math.round(current)}%`;
  }, stepMs);
}

function showLoadingScreen(emoji, msg, pct) {
  $('loading').style.display = 'flex';
  $('loadingEmoji').textContent = emoji;
  $('loadingMsg').textContent = msg;
  $('progressFill').style.width = `${pct}%`;
  $('progressLabel').textContent = `${pct}%`;
  $('loadingSub').textContent = '잠깐만 기다려주세요 🌟';
}

function updateLoadingScreen(emoji, msg, sub) {
  $('loadingEmoji').textContent = emoji;
  $('loadingMsg').textContent = msg;
  $('loadingSub').textContent = sub;
}

/* ── 이미지 fetch 로딩 (자동 3회 재시도) ── */
async function loadImg(url) {
  for (let attempt = 1; attempt <= 3; attempt++) {
    if (attempt > 1) {
      updateLoadingScreen('😅', `다시 그려볼게요... (${attempt}번째 시도)`, '조금만 더 기다려주세요!');
      await new Promise(r => setTimeout(r, 1500));
    }
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 40000); // 40초 타임아웃
      const resp = await fetch(url, { signal: controller.signal });
      clearTimeout(timer);
      if (!resp.ok) {
        if (attempt < 3) continue;
        throw new Error(`이미지 서버 오류 (${resp.status})`);
      }
      const blob = await resp.blob();
      if (blob.size < 500) {
        if (attempt < 3) continue;
        throw new Error('이미지가 너무 작아요. 다시 시도해보세요.');
      }
      if (lastBlobUrl) { URL.revokeObjectURL(lastBlobUrl); lastBlobUrl = null; }
      const blobUrl = URL.createObjectURL(blob);
      lastBlobUrl = blobUrl;
      return blobUrl;
    } catch(e) {
      if (attempt < 3) continue;
      throw new Error('그림을 불러오지 못했어요. 네트워크를 확인하고 다시 시도해보세요.');
    }
  }
}

async function retryGenerate() { hideError(); $('diary').value = lastText; await generateImage(); }

function showImage(url, badge) {
  currentImgUrl = url;
  const img = $('imgMain');
  img.src = url;
  img.style.display = 'block';
  $('placeholder').style.display = 'none';
  $('richnessBadge').textContent = badge;
  $('richnessBadge').style.display = 'block';
  $('imgInfo').textContent = '🎨 ' + badge + ' — 자세히 쓸수록 더 예쁜 그림이 나와요!';
}

function resetImage() {
  const img = $('imgMain');
  img.style.display = 'none';
  img.src = '';
  $('placeholder').style.display = 'flex';
  $('richnessBadge').style.display = 'none';
  $('imgInfo').textContent = '🖍️ 자세히 쓸수록 더 컬러풀한 그림일기가 나와요!';
  hideError();
}

/* ══════════════════════════════════════════
   Claude API 호출
══════════════════════════════════════════ */
async function callClaude(body) {
  let res;
  try {
    res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  } catch(e) {
    throw new Error(`프록시 서버 연결 실패: ${e.message}`);
  }
  const raw = await res.text();
  if (!raw || raw.trim() === '') throw new Error(`빈 응답 (HTTP ${res.status})`);
  let data;
  try { data = JSON.parse(raw); }
  catch(e) { throw new Error(`응답 파싱 실패: ${raw.slice(0,200)}`); }
  if (!res.ok) throw new Error(data.error?.message || `API 오류 HTTP ${res.status}`);
  const text = (data.content || []).filter(b => b.type==='text').map(b => b.text).join('');
  if (!text) throw new Error('모델이 빈 응답을 반환했어요.');
  return text;
}

/* ══════════════════════════════════════════
   UI 유틸
══════════════════════════════════════════ */
function showLoading(m)   { $('loading').style.display='flex'; $('loadingMsg').textContent=m; }
function hideLoading()    { $('loading').style.display='none'; clearInterval(progressTimer); }
function showError(t,d)   { $('errorTitle').textContent=t; $('errorDetail').textContent=d; $('errorOverlay').style.display='flex'; }
function hideError()      { $('errorOverlay').style.display='none'; }
function openModal(id)    { $(id).classList.add('open'); }
function closeModal(id)   { $(id).classList.remove('open'); }

document.querySelectorAll('.modal-bg').forEach(bg =>
  bg.addEventListener('click', e => { if(e.target===bg) bg.classList.remove('open'); }));

let toastT;
function toast(msg) {
  const el = $('toast'); el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 3000);
}
